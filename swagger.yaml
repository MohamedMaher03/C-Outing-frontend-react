        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: A category with this label already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                data: null
                message: Category already exists.
                errorCode: CATEGORY_ALREADY_EXISTS
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/categories/{categoryId}:
    patch:
      tags: [Admin]
      summary: Partially update a category
      operationId: updateAdminCategory
      description: >
        Send only the fields you want to change (label, icon, color, status).
        If updating `icon`, it must be a valid Lucide React icon name.
        Used for toggling category status (active/inactive), renaming, and
        changing the displayed icon.
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
          example: nightlife
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Category updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /admin/settings:
    get:
      tags: [Admin]
      summary: Get system-wide configuration
      operationId: getSystemSettings
      responses:
        "200":
          description: System settings returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SystemSettings"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

    patch:
      tags: [Admin]
      summary: Update system-wide configuration
      operationId: updateSystemSettings
      description: Partial update — send only the settings you want to change.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemSettings"
      responses:
        "200":
          description: Settings updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  # ════════════════════════════════════════════════════════════════════════════
  # TAG: Moderator
  # ════════════════════════════════════════════════════════════════════════════

  /moderator/stats:
    get:
      tags: [Moderator]
      summary: Get moderation queue statistics
      operationId: getModeratorStats
      description: Returns counts of pending reviews, flagged places, open reports, and resolution metrics.
      responses:
        "200":
          description: Moderation stats returned.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ModeratorStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /moderator/reports:
    get:
      tags: [Moderator]
      summary: Get all reported content items
      operationId: getReportedContent
      description: >
        Returns all open, investigating, resolved, and dismissed reports.
        Each item includes the `type` (review, place, or user), the
        `reason` and `description` fields submitted by the reporter,
        and — for review reports — the original `reviewContent` and
        `reviewAuthorName`.
      responses:
        "200":
          description: Reported content list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ReportedContent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /moderator/reports/{reportId}/status:
    patch:
      tags: [Moderator]
      summary: Update the status of a reported content item
      operationId: updateReportStatus
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
          example: "rpt-001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReportStatusRequest"
      responses:
        "200":
          description: Report status updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /moderator/actions:
    get:
      tags: [Moderator]
      summary: Get recent moderation actions
      operationId: getRecentModerationActions
      description: Returns a chronological list of actions taken by moderators (approved, removed, warned, escalated).
      responses:
        "200":
          description: Moderation actions list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ModerationAction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /moderator/reports/{reportId}/delete-review:
    post:
      tags: [Moderator]
      summary: Delete the review associated with a report
      operationId: moderatorDeleteReview
      description: >
        Deletes the flagged review referenced by the report and automatically
        resolves the report with `action: "removed"`. This is a moderator-level
        action (does not require admin privileges).
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
          example: "rpt-001"
      responses:
        "200":
          description: Review deleted and report resolved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /moderator/reports/{reportId}/warn:
    post:
      tags: [Moderator]
      summary: Send a warning to the user associated with a report
      operationId: moderatorWarnUser
      description: >
        Sends a system warning notification to the user who authored the
        reported content and resolves the report with `action: "warned"`.
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
          example: "rpt-001"
      responses:
        "200":
          description: Warning sent and report resolved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /moderator/reports/{reportId}/ban:
    post:
      tags: [Moderator]
      summary: Escalate the user for ban review and resolve the report
      operationId: moderatorBanUser
      description: >
        Escalates the report to admin-level for user ban consideration and
        resolves the report with `action: "escalated"`. The actual account
        suspension is processed by an admin via PATCH /admin/users/{userId}/status.
      parameters:
        - name: reportId
          in: path
          required: true
          schema:
            type: string
          example: "rpt-001"
      responses:
        "200":
          description: Report escalated for ban review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

# ──────────────────────────────────────────────────────────────────────────────
# TAG DEFINITIONS (display order in Swagger UI)
# ──────────────────────────────────────────────────────────────────────────────
tags:
  - name: Auth
    description: >
      Authentication endpoints. POST /login and POST /register are
      public (no Bearer token required). POST /logout requires a token.
  - name: Users
    description: >
      User profile, preferences, privacy, notifications, and account management.
      Both the Profile feature (numeric userId) and the Users feature (string
      userId for public profiles) target these endpoints.
  - name: Onboarding
    description: >
      First-time preference submission after account creation.
      Re-uses /users/{userId}/preferences — tagged separately for clarity.
  - name: Favorites
    description: Add, remove, list, and check saved/favorited places per user.
  - name: Home
    description: >
      Home page data — personalized recommendations, trending, and top-rated lists.
      Also includes the quick save/unsave toggle for venue cards.
  - name: Places
    description: Place detail page data, including similar places.
  - name: Reviews
    description: >
      User-submitted reviews (CRUD), social-media scraped reviews,
      NLP review summaries, and the Review Report flow.
  - name: Interactions
    description: >
      Fine-grained user interaction event tracking for the AI recommendation engine.
  - name: Admin
    description: >
      Admin-only endpoints. Requires role = "admin".
      Covers user management, place CRUD, review moderation,
      category management (including iconName/Lucide icon), and system settings.
  - name: Moderator
    description: >
      Moderator-only endpoints (role = "moderator" or "admin").
      Covers the report queue, moderation actions, and place moderation.
      Delegates place CRUD to the Admin endpoints.
