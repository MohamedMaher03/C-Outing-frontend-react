      summary: Record a user interaction event
      operationId: recordInteraction
      description: >
        Records fine-grained interaction events (Click, ViewDetails, Rate,
        Favorite, Share) for the recommendation engine. Called automatically
        by the Place Detail hook on page load and on user actions. The
        `sessionId` is a client-generated UUID per browser session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordInteractionRequest"
      responses:
        "200":
          description: Interaction recorded.
