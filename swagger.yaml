  # ════════════════════════════════════════════════════════════════════════════
  # TAG: Reviews  (Report flow — source: ReportedContent type + moderator feature)
  # ════════════════════════════════════════════════════════════════════════════

  /places/{placeId}/reviews/{reviewId}/report:
    post:
      tags: [Reviews]
      summary: Report an abusive or inappropriate review
      operationId: reportReview
      description: >
        Allows any authenticated user to report a review. The report lands
        in the Moderator queue (GET /moderator/reports) with
        `type: "review"`, populated `reviewContent`, and `reviewAuthorName`.
        Required fields are `reason` (short category) and `description`
        (free-text explanation).
      parameters:
        - name: placeId
          in: path
          required: true
          schema:
            type: string
          example: "pl-007"
        - name: reviewId
          in: path
          required: true
          schema:
            type: string
          description: ID of the review being reported.
          example: "rv-001"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportReviewRequest"
      responses:
        "201":
          description: Report submitted successfully. A new entry appears in the moderator queue.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

