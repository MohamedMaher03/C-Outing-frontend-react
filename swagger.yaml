      operationId: createCategory
      description: >
        Creates a new place category. The `icon` field must be a valid
        **Lucide React** icon component name (e.g. "Waves", "Anchor",
        "UtensilsCrossed"). The frontend renders the icon by looking up
        this string in the Lucide library. Refer to https://lucide.dev/icons
        for the full list of valid names. The `id` is derived server-side
        from the label (lower-cased, spaces replaced with hyphens).
        The `count` starts at 0.
      requestBody:
        required: true
