<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="islamicPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Geometric Islamic Pattern -->
      <g opacity="0.03">
        <!-- Center Star -->
        <path d="M50 20 L55 40 L75 40 L58 52 L65 70 L50 58 L35 70 L42 52 L25 40 L45 40 Z" 
              fill="none" stroke="#1a2845" stroke-width="0.5"/>
        
        <!-- Corner Ornaments -->
        <circle cx="10" cy="10" r="3" fill="none" stroke="#1a2845" stroke-width="0.5"/>
        <circle cx="90" cy="10" r="3" fill="none" stroke="#1a2845" stroke-width="0.5"/>
        <circle cx="10" cy="90" r="3" fill="none" stroke="#1a2845" stroke-width="0.5"/>
        <circle cx="90" cy="90" r="3" fill="none" stroke="#1a2845" stroke-width="0.5"/>
        
        <!-- Connecting Lines -->
        <path d="M10 10 L30 30 M70 30 L90 10 M10 90 L30 70 M70 70 L90 90" 
              stroke="#1a2845" stroke-width="0.3" fill="none"/>
        
        <!-- Additional Geometric Elements -->
        <rect x="20" y="20" width="10" height="10" fill="none" stroke="#1a2845" stroke-width="0.3" transform="rotate(45 25 25)"/>
        <rect x="70" y="20" width="10" height="10" fill="none" stroke="#1a2845" stroke-width="0.3" transform="rotate(45 75 25)"/>
        <rect x="20" y="70" width="10" height="10" fill="none" stroke="#1a2845" stroke-width="0.3" transform="rotate(45 25 75)"/>
        <rect x="70" y="70" width="10" height="10" fill="none" stroke="#1a2845" stroke-width="0.3" transform="rotate(45 75 75)"/>
      </g>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#islamicPattern)"/>
</svg>
